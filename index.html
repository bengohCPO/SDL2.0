<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Learning Journey: A Story of Gabriel — and You</title>
  <style>
    :root {
      --background: #f7f1e8;
      --surface: #fffaf2;
      --surface-strong: #fff5e6;
      --text: #24333a;
      --muted: #5d6c72;
      --heading: #17495a;
      --button: #1f5a6b;
      --button-hover: #276f83;
      --button-active: #143d49;
      --accent: #d99b38;
      --accent-soft: #fff0cf;
      --border: #e5d8c5;
      --shadow: rgba(45, 35, 25, 0.16);
      --timeline-line: #d7b46a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(217, 155, 56, 0.16), transparent 32rem),
        linear-gradient(135deg, #f7f1e8 0%, #edf4f3 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100%;
    }
    
.game-container {
  width: min(980px, 100%);
  height: 100vh;
  height: calc(var(--vh, 1vh) * 100);
  height: 100dvh;
  min-height: 0;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  background: rgba(255, 250, 242, 0.92);
  box-shadow: 0 0 40px var(--shadow);
  overflow: hidden;
}
   .progress-shell {
      flex: 0 0 auto;
      background: rgba(255, 250, 242, 0.98);
      border-bottom: 1px solid var(--border);
      padding: 1rem clamp(1rem, 3vw, 2rem);
      z-index: 10;
    }

    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.55rem;
    }

    .progress-title {
      margin: 0;
      color: var(--heading);
      font-size: clamp(1rem, 2vw, 1.15rem);
      font-weight: 750;
      letter-spacing: 0.01em;
    }

    .progress-text {
      color: var(--muted);
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .progress-track {
      width: 100%;
      height: 0.55rem;
      background: #eadfce;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--button));
      border-radius: inherit;
      transition: width 220ms ease;
    }

    .content-panel {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: clamp(1.25rem, 4vw, 2.5rem);
      padding-bottom: calc(6rem + env(safe-area-inset-bottom, 0px));
}

    .screen {
      max-width: 780px;
      margin: 0 auto;
      animation: fadeIn 180ms ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .kicker {
      margin: 0 0 0.5rem;
      color: var(--accent);
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3 {
      color: var(--heading);
      line-height: 1.15;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 5vw, 3.2rem);
    }

    h2 {
      margin: 0 0 1rem;
      font-size: clamp(1.55rem, 3.5vw, 2.35rem);
    }

    h3 {
      margin: 1.25rem 0 0.7rem;
      font-size: clamp(1.15rem, 2.5vw, 1.45rem);
    }

    p {
      margin: 0 0 1rem;
      font-size: clamp(1rem, 2.2vw, 1.08rem);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    strong {
      color: var(--heading);
      font-weight: 850;
    }

    em {
      color: inherit;
      font-style: italic;
    }

    .story-underline {
      text-decoration-line: underline;
      text-decoration-thickness: 0.11em;
      text-decoration-color: var(--accent);
      text-underline-offset: 0.18em;
    }

    .choice-button strong,
    .choice-button em,
    .choice-button .story-underline,
    .primary-button strong,
    .primary-button em,
    .primary-button .story-underline,
    .secondary-button strong,
    .secondary-button em,
    .secondary-button .story-underline {
      color: inherit;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: clamp(1.2rem, 3vw, 2rem);
      box-shadow: 0 18px 42px rgba(54, 41, 30, 0.08);
    }

    .scene-card {
      border-left: 0.55rem solid var(--button);
    }

    .closing-card {
      background: linear-gradient(180deg, var(--surface-strong), var(--surface));
      border-left: 0.55rem solid var(--accent);
    }

    .choice-card {
      border-top: 0.4rem solid var(--button);
    }

    .outcome-card {
      margin-top: 1.25rem;
      background: #f8fbfa;
      border: 1px solid #cddfdb;
      border-radius: 20px;
      padding: clamp(1rem, 3vw, 1.5rem);
    }

    .selected-option {
      background: #edf6f4;
      border: 1px solid #c7dfd9;
      border-radius: 16px;
      padding: 1rem;
      margin: 1rem 0 1.25rem;
      color: var(--heading);
      font-weight: 700;
      line-height: 1.55;
    }

    .reflection-callout {
      margin: 1.25rem 0;
      padding: 1rem 1.15rem;
      border-left: 0.35rem solid var(--accent);
      border-radius: 16px;
      background: var(--accent-soft);
      color: #59411b;
      font-style: italic;
      line-height: 1.65;
      box-shadow: inset 0 0 0 1px rgba(217, 155, 56, 0.14);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      margin-top: 1.5rem;
    }

    .choice-list {
      display: grid;
      gap: 0.85rem;
      margin: 1.25rem 0 1rem;
    }

    button {
      font: inherit;
    }

    .primary-button,
    .choice-button,
    .secondary-button {
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      transition:
        transform 140ms ease,
        background 140ms ease,
        box-shadow 140ms ease;
    }

    .primary-button,
    .secondary-button {
      padding: 0.9rem 1.25rem;
      background: var(--button);
      color: #fff;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(31, 90, 107, 0.2);
    }

    .secondary-button {
      background: #48626b;
    }

    .choice-button {
      width: 100%;
      padding: 1rem 1.1rem;
      background: #f2f8f7;
      border: 1px solid #bfd8d2;
      color: var(--heading);
      font-weight: 750;
      line-height: 1.5;
      text-align: left;
      border-radius: 18px;
    }

    .primary-button:hover,
    .secondary-button:hover,
    .choice-button:hover {
      transform: translateY(-1px);
    }

    .primary-button:hover,
    .choice-button:hover {
      background: var(--button-hover);
      color: #fff;
      box-shadow: 0 14px 26px rgba(31, 90, 107, 0.24);
    }

    .secondary-button:hover {
      background: #587680;
      color: #fff;
    }

    .primary-button:active,
    .secondary-button:active,
    .choice-button:active {
      transform: translateY(1px);
      background: var(--button-active);
      color: #fff;
    }

    .timeline {
      position: relative;
      margin: 1.75rem 0 2rem;
      padding-left: 1.65rem;
    }

    .timeline::before {
      content: "";
      position: absolute;
      top: 0.3rem;
      bottom: 0.3rem;
      left: 0.4rem;
      width: 3px;
      border-radius: 999px;
      background: var(--timeline-line);
    }

    .timeline-entry {
      position: relative;
      margin: 0 0 1.2rem;
      padding: 1rem 1rem 1rem 1.15rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 12px 28px rgba(54, 41, 30, 0.06);
    }

    .timeline-entry::before {
      content: "";
      position: absolute;
      left: -1.55rem;
      top: 1.15rem;
      width: 0.85rem;
      height: 0.85rem;
      background: var(--accent);
      border: 3px solid var(--surface);
      border-radius: 50%;
      box-shadow: 0 0 0 2px var(--timeline-line);
    }

    .timeline-entry h3 {
      margin: 0 0 0.45rem;
      font-size: 1.05rem;
    }

    .timeline-entry p {
      margin-bottom: 0.45rem;
      font-size: 0.98rem;
      line-height: 1.55;
    }

    .timeline-label {
      color: var(--muted);
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .closing-note {
      margin-top: 2rem;
      padding: clamp(1.15rem, 3vw, 1.7rem);
      background: var(--accent-soft);
      border: 1px solid rgba(217, 155, 56, 0.35);
      border-radius: 22px;
    }

    .closing-note h2 {
      margin-bottom: 1rem;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 640px) {
      .progress-row {
        align-items: flex-start;
        flex-direction: column;
        gap: 0.35rem;
      }

      .progress-text {
        white-space: normal;
      }

      .button-row {
        flex-direction: column;
      }

      .primary-button,
      .secondary-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="game-container" aria-label="Your Learning Journey game">
    <section class="progress-shell" aria-label="Game progress">
      <div class="progress-row">
        <p class="progress-title">Your Learning Journey</p>
        <p class="progress-text" id="progress-text">How to Play · Choice 0 of 9</p>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </section>

    <section class="content-panel" id="content-panel" aria-live="polite"></section>
  </main>

  <script>
    // Data layer: all storyline content, scene order, choice labels, outcomes, and scene pointers live here.
    // Inline formatting supported inside storyline strings:
    // **bold text**
    // *italic text*
    // __underlined text__
    const storyData = {
      title: "Your Learning Journey: A Story of Gabriel — and You",
      introTitle: "How to Play",
      intro: [
        `You are Gabriel. As you move through school, you will face moments where you need to make choices — about **how to learn, who to work with, and what matters to you**. There are no wrong answers. Some paths will be harder, some more rewarding. Pay attention to why you make each choice. That's where the real learning happens.`
      ],
      closingNoteTitle: "A Note for Players",
      closingNote: [
        `Throughout this game, you were never asked to get the "right" answer. You were asked to make choices — and to notice, even briefly, why you made them.`,
        `That noticing is the point. It's what Gabriel was learning to do, across every scene. And it's what self-directed learning actually looks like: not a perfect plan, but a growing awareness of yourself as someone who learns, adapts, reflects, and keeps going.`,
        `What kind of learner are you becoming?`
      ],
      scenes: [
        {
          id: "scene-1",
          title: "SCENE 1: Primary 5 — The Reading Corner Problem",
          settingTitle: "Setting the Scene",
          setting: [
            `It's a Tuesday morning in Mrs. Raj's Mathematics class. You feel bothered about something she had explained. She had drawn two shapes on the board — a long, thin rectangle and a squarish one. Both have the same perimeter. But their areas are completely different.`,
            `*How can that be?* You stare at your notebook. The numbers are right there, but they don't feel real yet.`,
            `Then Mrs. Raj announces a class project: your class will redesign the reading corner. She wants your group to come up with the best possible layout — one that gives students the most space and feels welcoming.`,
            `You look over at the reading corner. It's a bit cramped. You've always wanted it to be better.`
          ],
          nextSceneId: "scene-2",
          endTitle: "End of Scene 1",
          endText: [
            `However you played this scene, you leave Primary 5 with something. Maybe it's a clearer understanding of area and perimeter. Maybe it's a new way of working with others. Maybe it's the beginning of a habit — of asking why, of connecting ideas, of noticing when something doesn't quite make sense yet and staying with it until it does.`,
            `Secondary school is coming. Things are about to get bigger.`
          ],
          choices: [
            {
              id: 1,
              title: "Choice 1 — How do you want to start?",
              prompt: [
                `Mrs. Raj gives your group some time to plan. Your groupmates are already talking over each other. You have a few ideas about how to begin.`
              ],
              reflection: `Take a moment — why did you pick that option? What were you hoping it would help you do?`,
              options: [
                {
                  label: "Option A",
                  text: `Jump straight in — start measuring the reading corner right away so you have real numbers to work with.`,
                  outcome: `You grab the measuring tape and get to work. The numbers ground you — you now know exactly how much space you have. But when your group starts arguing about which layout is best, you realise you don't yet have a way to compare them fairly. You'll need to think about what "best" actually means.`
                },
                {
                  label: "Option B",
                  text: `Sketch a few layout ideas first, so your group has something to discuss before measuring.`,
                  outcome: `Your sketches spark a lively discussion. But when someone asks, "Will this layout actually fit?", you realise you need measurements to check. The ideas are exciting — now you need the numbers to back them up.`
                },
                {
                  label: "Option C",
                  text: `Ask Mrs. Raj what she thinks the most important thing to figure out is before you start.`,
                  outcome: `Mrs. Raj smiles and says, "Good question. What do you think matters most — the space, the comfort, or the look?" You hadn't thought about anticipating the different considerations. It makes the problem feel bigger, but more interesting and with a concrete starting point to work on.`
                }
              ]
            },
            {
              id: 2,
              title: "Choice 2 — The Problem Gets Complicated",
              prompt: [
                `Your group has two possible layouts. Layout A is long and narrow. Layout B is more square-shaped. Both fit within the same perimeter — the same total length of wall space. But when you calculate the areas, Layout B gives noticeably more floor space.`,
                `Your groupmate Priya says, "Let's just go with B, it's obviously bigger."`,
                `But you remember something from Science — the reading corner is near the window. A long, narrow layout might actually get more natural light across the whole space.`
              ],
              reflection: `Why did you choose that? What were you weighing up?`,
              options: [
                {
                  label: "Option A",
                  text: `Agree with Priya. The bigger area is more important — students need room to move.`,
                  outcome: `Your group moves quickly and confidently. The design comes together fast. But during the presentation, Mrs. Raj asks, "Did you think about how the light falls?" You pause. You had thought about it — but let it go. You make a note to yourself: *speed isn't always the same as thoroughness*.`
                },
                {
                  label: "Option B",
                  text: `Push back gently. Suggest that light and comfort matter too, not just floor space.`,
                  outcome: `Priya looks a little annoyed at first, but listens. The conversation slows down — but gets richer. Your group starts thinking about what "best" really means for the people who'll use the space.`
                },
                {
                  label: "Option C",
                  text: `Propose testing both layouts by sketching how light would fall across each one, before deciding.`,
                  outcome: `It takes more time, but your group ends up with a much more considered design. You feel the difference between a quick answer and a well-reasoned one.`
                }
              ]
            },
            {
              id: 3,
              title: "Choice 3 — Reflection Time",
              prompt: [
                `At the end of the week, Mrs. Raj asks everyone to write a short reflection in their learning journal. She asks: *What did you learn — not just about Math, but about how you learn?*`,
                `You think about the week. The confusion at the start. The measuring. The arguments in your group. The moment the area-perimeter idea finally clicked.`
              ],
              reflection: `What feels most true to what you actually experienced this week?`,
              options: [
                {
                  label: "Option A",
                  text: `Write about the Math — how you now understand that same perimeter doesn't mean same area.`,
                  outcome: `Mrs. Raj affirms your mathematical understanding. She also gently asks, "How did you figure it out? What helped the idea click?" You realise the *how* is just as worth remembering as the *what*.`
                },
                {
                  label: "Option B",
                  text: `Write about working with your group — what was hard and what helped.`,
                  outcome: `Mrs. Raj notes that you're already thinking about collaboration as a skill. She asks, "What would you do differently next time — and why?" You find yourself thinking harder than you expected.`
                },
                {
                  label: "Option C",
                  text: `Write about how the different subjects connected — how Math, Science and Art each helped you solve a different part of the same problem.`,
                  outcome: `Mrs. Raj is visibly pleased. "You've done something important," she says. "You've seen how learning in one subject can help you in another. That's a habit worth keeping." You feel something settle — like a piece of a larger puzzle has clicked into place.`
                }
              ]
            }
          ]
        },
        {
          id: "scene-2",
          title: "SCENE 2: Lower Secondary — The Canteen Project",
          settingTitle: "Setting the Scene",
          setting: [
            `Secondary school is different from what you expected. There are new subjects, new teachers, a CCA you're still finding your footing in — and fewer year-end exams than you thought there'd be. That last part surprises you. It means you have more room to actually think about things, rather than just prepare for tests.`,
            `In Sustainable Living, your class is exploring a problem you find very purposeful: *How can teenagers reduce food waste in Singapore?*`,
            `Your teacher, Mr. Lim, doesn't give you a worksheet. He tells you to go and find out for yourselves.`,
            `You start spending time at the school canteen during recess, watching. You notice how much food gets left on plates. You start talking to the stallholders. Uncle Ahmad, who runs the mixed rice stall, tells you he throws away a significant amount of food every single day. He looks tired when he says it.`,
            `Something about that sticks with you.`
          ],
          nextSceneId: "scene-3",
          endTitle: "End of Scene 2",
          endText: [
            `You've spent a term on something that felt purposeful. Uncle Ahmad's canteen is a little different now. You've learned something about what it means to make learning matter beyond the classroom.`,
            `You're heading into upper secondary. The choices are about to increase in more exciting ways.`,
            `In upper Secondary, you will choose **Elective Modules** that reflect your own interests and strengths. The habits you have built - of asking why, staying with uncertainty, and connecting ideas - will help you decided **what** Elective Modules to choose, and **how** you are going to leverage them for your learning. Already, you are excited to explore an Elective Module on design, to extend what y ou learned in Uncle Ahmad's canteen.`,
            `More importantly, you are hopeful that the choices you make in Upper Secondary - in **what** and **how** you learn - might lead you towards something bigger: a sense of purpose. You are excited to see how that sense of purpose might one day help you to contribute to wider society.`
          ],
          choices: [
            {
              id: 4,
              title: "Choice 4 — How do you want to investigate?",
              prompt: [
                `Your group needs to understand the problem before you can solve it. You have a few weeks and some real freedom in how you use them.`
              ],
              reflection: `What's guiding your choice here — thoroughness, curiosity, practicality, or something else?`,
              options: [
                {
                  label: "Option A",
                  text: `Focus on collecting data — count the plates, weigh the leftovers, build a clear picture of how much is actually being wasted.`,
                  outcome: `Your data is compelling. Numbers have a way of making a problem feel real and undeniable. But when you present your findings to Uncle Ahmad, he nods slowly and says, "I know. But what do you want me to do about it?" You reflect that data alone doesn't tell you what to change.`
                },
                {
                  label: "Option B",
                  text: `Focus on understanding *why* — talk to more students and stallholders to find out what's driving the waste.`,
                  outcome: `The conversations are rich and sometimes surprising. Students say portions are too large. Uncle Ahmad says he buys his ingredients wholesale and can't easily reduce portions without losing money. You start to connect perspectives from multiple stakeholders — and that makes finding the solution harder, but more impactful.`
                },
                {
                  label: "Option C",
                  text: `Do both, but accept that you'll have less depth in each area given the time you have.`,
                  outcome: `You have a bit of everything. It's messier, but it reflects the real complexity of the problem. Mr. Lim tells you, "Real problems rarely fit neatly into one approach."`
                }
              ]
            },
            {
              id: 5,
              title: "Choice 5 — Designing a Solution",
              prompt: [
                `Your group has landed on an idea: colour-coded plates that guide students to indicate portion sizes before ordering. Smaller portions, less waste. You've used ratios from Mathematics to work out the plate sizes, and thought carefully about colour choices from Art.`,
                `But when you bring the idea to Uncle Ahmad, he hesitates. "Need to buy new plates. More cost. I'm not sure this helps me."`,
                `Your group is deflated. You've worked hard on this. But you can see his point.`
              ],
              reflection: `What does your choice say about how you handle a setback?`,
              options: [
                {
                  label: "Option A",
                  text: `Go back to the drawing board — the idea clearly doesn't work if the stallholder won't adopt it.`,
                  outcome: `Starting over is demoralising, but your group comes back with a more practical idea. You learn something important: its important to assess and adjust when facing challenges. `
                },
                {
                  label: "Option B",
                  text: `Try to persuade Uncle Ahmad by explaining the benefits to students and the school more clearly.`,
                  outcome: `Uncle Ahmad listens politely but remains unconvinced. You realise that persuasion works better if you try to address the recipient’s real needs.`
                },
                {
                  label: "Option C",
                  text: `Reframe the conversation — ask Uncle Ahmad what *his* biggest problem is, and see if your solution can be adjusted to address it too.`,
                  outcome: `This is harder than it sounds — you have to really listen, and then think on your feet. But when you ask Uncle Ahmad what worries him most, he mentions ingredient costs. You find yourself saying, almost without planning to: "What if this actually helps you save on ingredients?" His expression shifts. The conversation changes.`
                }
              ]
            },
            {
              id: 6,
              title: "Choice 6 — Managing the Final Push",
              prompt: [
                `It's the last week before your group's presentation. There's still a lot to finish — your prototype, your portfolio documentation, your reflection. One of your groupmates, Siti, is stressed and wants to redo a section she's unhappy with. Another, Wei Jie, thinks you should just submit what you have.`,
                `You're somewhere in the middle — tired, but still caring about the outcome.`
              ],
              reflection: `How do you usually handle pressure near a deadline — and is that working for you?`,
              options: [
                {
                  label: "Option A",
                  text: `Side with Wei Jie. You've done enough. Submit what you have and rest.`,
                  outcome: `You submit on time and feel relieved. But during the presentation, you notice the gap Siti was worried about. You reflect that addressing gaps ahead of time can alleviate anxieties down the road.`
                },
                {
                  label: "Option B",
                  text: `Support Siti. If she feels it's not good enough, it's worth the extra effort.`,
                  outcome: `Siti appreciates it. The section improves. But Wei Jie is frustrated, and the group dynamic feels strained at the end. You wonder whether setting common learning goals ahead of time could have helped everyone work together better. `
                },
                {
                  label: "Option C",
                  text: `Call a quick group check-in. List what absolutely needs to be done, what would be nice to improve, and decide together.`,
                  outcome: `With the check-in, your group improves the section with reasonable effort, although it is still not perfect. Even so, the group is pleased that time and resources feel strategically used. `
                }
              ]
            }
          ]
        },
        {
          id: "scene-3",
          title: "SCENE 3: Upper Secondary/JC — Choosing Your Direction",
          settingTitle: "Setting the Scene",
          setting: [
            `In Upper Secondary, you have purposely chosen a subject combination that best aligns with your interests in the Sciences. Now, near the end of Term 1 in Secondary 3, you are faced with another choice - Elective Modules on SLS, which are learning opportunities for him to choose by his interests and needs.`,
            `You are feeling slightly overwhelmed by the choices available. *I'm still figuring out what I'm interested in*, you thought to yourself. However, you recall your experiences in primary school and lower secondary, which has grown your capacity to learn independently. You have some knowledge of **how to learn** and reflecting on what **matters most to you**. `
          ],
          nextSceneId: null,
          endTitle: "SCENE 3 — End",
          endText: [

              ],
              reflection: `How could your choice in EMs be able to help connect and apply your learning in more diverse ways?`,
              options: [

            {
              id: 9,
              title: "Choice 9 — Keeping up to date!",
              prompt: [
                `Congratulations! You have graduated from your secondary school, and you are currently in your first year of Junior College.`,
                `During General Paper lesson, your tutor assigned your class to prepare for a presentation on AI and its effects on human society. You groaned, remembering the discussion your classmates had about how 'AI slop' is undermining the hard work and time that artists have put in. `,
                `As you logged into SLS, you noticed that some EMs have been recently updated to reflect the latest developments of AI in various field, such as how a local company utilised AI in the development of a gene therapy apporach for cancer treatement, while another made use of AI in the clasisfication of fine art.`
              ],
              reflection: `How would my learning look like, if what I learnt could keep up with how the world changes?`,
              options: [
                {
                  label: "Option A",
                  text: `Choose an EM that showcases the use of AI to create artworks, and its implications on artists and copyrights.`,
                  outcome: `You reflect that AI has the ability to impact diverse fields, and can be a powerful tool for your own learning in school as well.`
                },
                {
                  label: "Option B",
                  text: `Choose an EM that showcases the use of AI to better process large DNA datasets, and what it means for personal genomic information.`,
                  outcome: `You reflect that AI has the ability to impact diverse fields, and can be a powerful tool for your own learning in school as well.`

          ]
        }
      ]
    };

    // Navigation state.
    const totalChoices = storyData.scenes.reduce((sum, scene) => sum + scene.choices.length, 0);
    const playerChoices = [];
    const SAVE_KEY = "gabrielLearningJourneySave-v1";
    let currentSceneIndex = 0;
    let currentChoiceIndex = 0;
    let currentView = "welcome";
    let savedSelectedOption = null;

    const contentPanel = document.getElementById("content-panel");
    const progressText = document.getElementById("progress-text");
    const progressFill = document.getElementById("progress-fill");

    function setMobileViewportHeight() {
  const viewportHeight = window.innerHeight * 0.01;
  document.documentElement.style.setProperty("--vh", `${viewportHeight}px`);
}

setMobileViewportHeight();
window.addEventListener("resize", setMobileViewportHeight);
window.addEventListener("orientationchange", setMobileViewportHeight);

    // Local storage helpers: save and restore progress on the same browser and device.
    function isLocalStorageAvailable() {
      try {
        const testKey = `${SAVE_KEY}-test`;
        localStorage.setItem(testKey, "1");
        localStorage.removeItem(testKey);
        return true;
      } catch (error) {
        return false;
      }
    }

    function saveGameState() {
      if (!isLocalStorageAvailable()) {
        return;
      }

      const saveData = {
        version: 1,
        playerChoices,
        currentSceneIndex,
        currentChoiceIndex,
        currentView,
        savedSelectedOption
      };

      localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
    }

    function loadGameState() {
      if (!isLocalStorageAvailable()) {
        return null;
      }

      const savedData = localStorage.getItem(SAVE_KEY);

      if (!savedData) {
        return null;
      }

      try {
        return JSON.parse(savedData);
      } catch (error) {
        localStorage.removeItem(SAVE_KEY);
        return null;
      }
    }

    function clearSavedGameState() {
      if (isLocalStorageAvailable()) {
        localStorage.removeItem(SAVE_KEY);
      }
    }

    function restoreSavedChoices(savedChoices) {
      playerChoices.splice(0, playerChoices.length);

      if (Array.isArray(savedChoices)) {
        playerChoices.push(...savedChoices);
      }
    }

    function isValidSceneAndChoice(sceneIndex, choiceIndex) {
      return Boolean(
        storyData.scenes[sceneIndex] &&
        storyData.scenes[sceneIndex].choices[choiceIndex]
      );
    }
    
    // Formatting helpers: safely escape story text, then convert simple inline markers into styled HTML.
    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatStoryText(text) {
      let formattedText = escapeHtml(text);
      const replacements = [];

      function storeReplacement(html) {
        const token = `@@STORY_FORMAT_${replacements.length}@@`;
        replacements.push({ token, html });
        return token;
      }

      formattedText = formattedText.replace(/\*\*(.+?)\*\*/gs, (match, content) => {
        return storeReplacement(`<strong>${content}</strong>`);
      });

      formattedText = formattedText.replace(/__(.+?)__/gs, (match, content) => {
        return storeReplacement(`<span class="story-underline">${content}</span>`);
      });

      formattedText = formattedText.replace(/\*(.+?)\*/gs, (match, content) => {
        return storeReplacement(`<em>${content}</em>`);
      });

      replacements.forEach(({ token, html }) => {
        formattedText = formattedText.replaceAll(token, html);
      });

      return formattedText;
    }

    // Render helpers.
    function resetInternalScroll() {
      contentPanel.scrollTop = 0;
    }

    function clearContent() {
      contentPanel.innerHTML = "";
    }

    function createElement(tagName, className, text) {
      const element = document.createElement(tagName);

      if (className) {
        element.className = className;
      }

      if (typeof text === "string") {
        element.textContent = text;
      }

      return element;
    }

    function createFormattedElement(tagName, className, text) {
      const element = document.createElement(tagName);

      if (className) {
        element.className = className;
      }

      if (typeof text === "string") {
        element.innerHTML = formatStoryText(text);
      }

      return element;
    }

    function appendParagraphs(parent, paragraphs) {
      paragraphs.forEach((paragraphText) => {
        parent.appendChild(createFormattedElement("p", "", paragraphText));
      });
    }

    function createButton(text, className, onClick) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = className;
      button.innerHTML = formatStoryText(text);
      button.addEventListener("click", onClick);
      return button;
    }

    function getChoiceByNumber(choiceNumber) {
      for (const scene of storyData.scenes) {
        const foundChoice = scene.choices.find((choice) => choice.id === choiceNumber);
        if (foundChoice) {
          return foundChoice;
        }
      }
      return null;
    }

    function updateProgress(viewType, sceneIndex = 0, choiceNumber = 0) {
      let displayText = "";
      let fillPercent = 0;

      if (viewType === "welcome") {
        displayText = `How to Play · Choice 0 of ${totalChoices}`;
        fillPercent = 0;
      } else if (viewType === "final") {
        displayText = `Final Summary · Choice ${totalChoices} of ${totalChoices}`;
        fillPercent = 100;
      } else {
        const safeSceneIndex = Math.max(0, Math.min(sceneIndex, storyData.scenes.length - 1));
        const safeChoiceNumber = Math.max(0, Math.min(choiceNumber, totalChoices));
        displayText = `Scene ${safeSceneIndex + 1} of ${storyData.scenes.length} · Choice ${safeChoiceNumber} of ${totalChoices}`;
        fillPercent = totalChoices === 0 ? 0 : (safeChoiceNumber / totalChoices) * 100;
      }

      progressText.textContent = displayText;
      progressFill.style.width = `${fillPercent}%`;
    }

    function getNextChoiceNumberForScene(sceneIndex) {
      const scene = storyData.scenes[sceneIndex];
      return scene && scene.choices.length ? scene.choices[0].id : 0;
    }

    // Render functions.
    function renderWelcome() {
      currentView = "welcome";
      currentSceneIndex = 0;
      currentChoiceIndex = 0;
      savedSelectedOption = null;
      saveGameState();

      clearContent();
      updateProgress("welcome");

      const screen = createElement("article", "screen card");
      screen.appendChild(createFormattedElement("p", "kicker", storyData.introTitle));
      screen.appendChild(createFormattedElement("h1", "", storyData.title));
      appendParagraphs(screen, storyData.intro);

      const buttonRow = createElement("div", "button-row");
      buttonRow.appendChild(
        createButton("Begin Your Journey", "primary-button", () => {
          renderSceneOpening(0);
        })
      );
      screen.appendChild(buttonRow);

      contentPanel.appendChild(screen);
      resetInternalScroll();
    }

    function renderSceneOpening(sceneIndex) {
      currentView = "scene-opening";
      currentSceneIndex = sceneIndex;
      currentChoiceIndex = 0;
      savedSelectedOption = null;
      saveGameState();

      const scene = storyData.scenes[sceneIndex];
      const nextChoiceNumber = getNextChoiceNumberForScene(sceneIndex);

      clearContent();
      updateProgress("scene", sceneIndex, nextChoiceNumber);

      const screen = createElement("article", "screen card scene-card");
      screen.appendChild(createElement("p", "kicker", `Scene ${sceneIndex + 1}`));
      screen.appendChild(createFormattedElement("h2", "", scene.title));
      screen.appendChild(createFormattedElement("h3", "", scene.settingTitle));
      appendParagraphs(screen, scene.setting);

      const buttonRow = createElement("div", "button-row");
      buttonRow.appendChild(
        createButton(`Continue to Choice ${nextChoiceNumber}`, "primary-button", () => {
          renderChoice(sceneIndex, 0);
        })
      );
      screen.appendChild(buttonRow);

      contentPanel.appendChild(screen);
      resetInternalScroll();
    }

    function renderChoice(sceneIndex, choiceIndex) {
      currentView = "choice";
      currentSceneIndex = sceneIndex;
      currentChoiceIndex = choiceIndex;
      savedSelectedOption = null;
      saveGameState();

      const scene = storyData.scenes[sceneIndex];
      const choice = scene.choices[choiceIndex];

      clearContent();
      updateProgress("choice", sceneIndex, choice.id);

      const screen = createElement("article", "screen card choice-card");
      screen.appendChild(createFormattedElement("p", "kicker", scene.title));
      screen.appendChild(createFormattedElement("h2", "", choice.title));
      appendParagraphs(screen, choice.prompt);

      if (choice.reflection) {
        screen.appendChild(createFormattedElement("div", "reflection-callout", choice.reflection));
      }

      const choiceList = createElement("div", "choice-list");
      choice.options.forEach((option) => {
        const optionButtonText = `${option.label}: ${option.text}`;
        const optionButton = createButton(optionButtonText, "choice-button", () => {
          handleChoiceSelection(sceneIndex, choiceIndex, option);
        });
        choiceList.appendChild(optionButton);
      });
      screen.appendChild(choiceList);

      contentPanel.appendChild(screen);
      resetInternalScroll();
    }

    function renderOutcome(sceneIndex, choiceIndex, selectedOption) {
      currentView = "outcome";
      currentSceneIndex = sceneIndex;
      currentChoiceIndex = choiceIndex;
      savedSelectedOption = selectedOption;
      saveGameState();

      const scene = storyData.scenes[sceneIndex];
      const choice = scene.choices[choiceIndex];

      clearContent();
      updateProgress("outcome", sceneIndex, choice.id);

      const screen = createElement("article", "screen card");
      screen.appendChild(createFormattedElement("p", "kicker", `${scene.title} · ${choice.title}`));
      screen.appendChild(createElement("h2", "", "Outcome"));

      const selectedOptionBox = createFormattedElement(
        "div",
        "selected-option",
        `${selectedOption.label}: ${selectedOption.text}`
      );
      screen.appendChild(selectedOptionBox);

      const outcomeCard = createElement("div", "outcome-card");
      outcomeCard.appendChild(createFormattedElement("p", "", selectedOption.outcome));
      screen.appendChild(outcomeCard);

      const buttonRow = createElement("div", "button-row");
      buttonRow.appendChild(
        createButton("Continue", "primary-button", () => {
          navigateAfterOutcome(sceneIndex, choiceIndex);
        })
      );
      screen.appendChild(buttonRow);

      contentPanel.appendChild(screen);
      resetInternalScroll();
    }

    function renderSceneEnd(sceneIndex) {
      currentView = "scene-end";
      currentSceneIndex = sceneIndex;
      savedSelectedOption = null;

      const scene = storyData.scenes[sceneIndex];
      currentChoiceIndex = Math.max(0, scene.choices.length - 1);
      saveGameState();

      const lastChoiceNumber = scene.choices.length ? scene.choices[scene.choices.length - 1].id : 0;

      clearContent();
      updateProgress("scene-end", sceneIndex, lastChoiceNumber);

      const screen = createElement("article", "screen card closing-card");
      screen.appendChild(createFormattedElement("p", "kicker", scene.title));
      screen.appendChild(createFormattedElement("h2", "", scene.endTitle));
      appendParagraphs(screen, scene.endText);

      const buttonRow = createElement("div", "button-row");
      if (scene.nextSceneId) {
        buttonRow.appendChild(
          createButton("Continue to Next Scene", "primary-button", () => {
            renderSceneOpening(sceneIndex + 1);
          })
        );
      } else {
        buttonRow.appendChild(
          createButton("Continue to Final Summary", "primary-button", () => {
            renderFinalSummary();
          })
        );
      }

      screen.appendChild(buttonRow);
      contentPanel.appendChild(screen);
      resetInternalScroll();
    }

    // Event handlers and navigation logic.
    function handleChoiceSelection(sceneIndex, choiceIndex, selectedOption) {
      const scene = storyData.scenes[sceneIndex];
      const choice = scene.choices[choiceIndex];

      playerChoices.push({
        sceneTitle: scene.title,
        choiceNumber: choice.id,
        choiceTitle: choice.title,
        selectedOptionLabel: selectedOption.label,
        selectedOptionText: selectedOption.text,
        outcomeText: selectedOption.outcome
      });

      renderOutcome(sceneIndex, choiceIndex, selectedOption);
    }

    function navigateAfterOutcome(sceneIndex, choiceIndex) {
      const scene = storyData.scenes[sceneIndex];
      const nextChoiceIndex = choiceIndex + 1;

      if (nextChoiceIndex < scene.choices.length) {
        renderChoice(sceneIndex, nextChoiceIndex);
      } else {
        renderSceneEnd(sceneIndex);
      }
    }

    function restartGame() {
      playerChoices.splice(0, playerChoices.length);
      currentSceneIndex = 0;
      currentChoiceIndex = 0;
      currentView = "welcome";
      savedSelectedOption = null;
      clearSavedGameState();
      renderWelcome();
    }

    // Timeline builder.
    function getOutcomePreview(outcomeText) {
      const abbreviations = [
        ["Mrs.", "Mrs[dot]"],
        ["Mr.", "Mr[dot]"],
        ["Ms.", "Ms[dot]"]
      ];

      let protectedText = outcomeText;
      abbreviations.forEach(([original, replacement]) => {
        protectedText = protectedText.replaceAll(original, replacement);
      });

      const sentenceMatch = protectedText.match(/^.*?[.!?](?=\s|$|")/);
      let preview = sentenceMatch ? sentenceMatch[0] : protectedText;

      abbreviations.forEach(([original, replacement]) => {
        preview = preview.replaceAll(replacement, original);
      });

      return preview;
    }

    function renderFinalSummary() {
      currentView = "final";
      currentSceneIndex = storyData.scenes.length - 1;
      currentChoiceIndex = Math.max(0, storyData.scenes[currentSceneIndex].choices.length - 1);
      savedSelectedOption = null;
      saveGameState();

      clearContent();
      updateProgress("final");

      const screen = createElement("article", "screen");
      const summaryCard = createElement("section", "card");
      summaryCard.appendChild(createElement("p", "kicker", "Final Summary"));
      summaryCard.appendChild(createElement("h1", "", "Your Learning Timeline"));

      const timeline = createElement("div", "timeline");

      playerChoices.forEach((entry) => {
        const timelineEntry = createElement("div", "timeline-entry");
        timelineEntry.appendChild(createElement("p", "timeline-label", `Choice ${entry.choiceNumber}`));
        timelineEntry.appendChild(createFormattedElement("h3", "", entry.sceneTitle));
        timelineEntry.appendChild(createFormattedElement("p", "", `${entry.selectedOptionLabel}: ${entry.selectedOptionText}`));
        timelineEntry.appendChild(createFormattedElement("p", "", getOutcomePreview(entry.outcomeText)));
        timeline.appendChild(timelineEntry);
      });

      summaryCard.appendChild(timeline);

      const closingNote = createElement("section", "closing-note");
      closingNote.appendChild(createFormattedElement("h2", "", storyData.closingNoteTitle));
      appendParagraphs(closingNote, storyData.closingNote);
      summaryCard.appendChild(closingNote);

      const buttonRow = createElement("div", "button-row");
      buttonRow.appendChild(
        createButton("Restart Journey", "secondary-button", () => {
          restartGame();
        })
      );
      summaryCard.appendChild(buttonRow);

      screen.appendChild(summaryCard);
      contentPanel.appendChild(screen);
      resetInternalScroll();
    }

    // Restore saved progress, or start the single-page game from the welcome screen.
    function restoreGameOrStartFresh() {
      const savedData = loadGameState();

      if (!savedData || savedData.version !== 1) {
        renderWelcome();
        return;
      }

      restoreSavedChoices(savedData.playerChoices);
      currentSceneIndex = Number.isInteger(savedData.currentSceneIndex) ? savedData.currentSceneIndex : 0;
      currentChoiceIndex = Number.isInteger(savedData.currentChoiceIndex) ? savedData.currentChoiceIndex : 0;
      currentView = savedData.currentView || "welcome";
      savedSelectedOption = savedData.savedSelectedOption || null;

      if (currentView === "scene-opening" && storyData.scenes[currentSceneIndex]) {
        renderSceneOpening(currentSceneIndex);
      } else if (currentView === "choice" && isValidSceneAndChoice(currentSceneIndex, currentChoiceIndex)) {
        renderChoice(currentSceneIndex, currentChoiceIndex);
      } else if (currentView === "outcome" && isValidSceneAndChoice(currentSceneIndex, currentChoiceIndex) && savedSelectedOption) {
        renderOutcome(currentSceneIndex, currentChoiceIndex, savedSelectedOption);
      } else if (currentView === "scene-end" && storyData.scenes[currentSceneIndex]) {
        renderSceneEnd(currentSceneIndex);
      } else if (currentView === "final") {
        renderFinalSummary();
      } else {
        clearSavedGameState();
        renderWelcome();
      }
    }

    restoreGameOrStartFresh();
  </script>
